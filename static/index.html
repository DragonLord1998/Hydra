<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hydra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Canvas layer -->
  <div id="canvasViewport" class="canvas-viewport">
    <div id="canvasWorld" class="canvas-world"></div>
  </div>

  <!-- UI overlay layer -->
  <div class="ui-overlay">
    <div class="overlay-header">
      <div class="header-row">
        <h1 class="title">HYDRA</h1>
        <div class="model-selector" id="modelSelector">
          <button class="model-btn active" data-model="srpo">SRPO</button>
          <button class="model-btn" data-model="base">Z-IMAGE</button>
        </div>
        <div class="lora-controls">
          <input type="text" id="triggerWord" class="trigger-input" placeholder="trigger" value="chrx" spellcheck="false">
          <label class="lora-btn" id="loraBtn" title="Upload LoRA (.safetensors)">
            <input type="file" id="loraFile" accept=".safetensors" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </label>
          <button class="settings-btn" id="settingsBtn" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="settings-panel" id="settingsPanel" style="display:none;">
        <div class="settings-row" id="resolutionRow">
          <label class="settings-label">Resolution</label>
          <select class="settings-select" id="resolutionSelect">
            <option value="512x512">512 x 512</option>
            <option value="768x768">768 x 768</option>
            <option value="1024x1024" selected>1024 x 1024</option>
            <option value="1024x1536">1024 x 1536</option>
            <option value="1536x1024">1536 x 1024</option>
            <option value="1536x1536">1536 x 1536</option>
          </select>
        </div>
        <div class="settings-row">
          <label class="settings-label">Steps</label>
          <div class="steps-control">
            <input type="range" id="stepsRange" class="settings-range" min="1" max="100" value="50">
            <span class="steps-value" id="stepsValue">50</span>
          </div>
        </div>
      </div>
      <div class="lora-status" id="loraStatus"></div>
    </div>
    <div class="overlay-prompt">
      <div class="prompt-bar">
        <input type="text" id="promptInput" class="prompt-input" placeholder="describe your character..." spellcheck="false" autocomplete="off">
        <label class="upload-img-btn" id="uploadImgBtn" title="Upload image to edit" style="display:none;">
          <input type="file" id="imageFile" accept="image/png,image/jpeg,image/webp" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </label>
        <button class="mode-toggle" id="modeToggle" title="Generate mode (click to switch)"></button>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
